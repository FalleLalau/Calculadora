<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/68e3aa0b6f.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css" />
    <title>Calculadora</title>
  </head>
  <body>
    <div class="tudo">
      <input type="text" id="display" disabled />
      <div class="button">

  <button class="top-row" onclick="deleteToDisplay()">
    <i class="fa-solid fa-delete-left"></i>
  </button>

  <button class="top-row" onclick="clearDisplay()">AC</button>
  <button class="top-row" onclick="appendToDisplay('%')">%</button>
  <button class="operation" onclick="appendToDisplay('/')">÷</button>

  <button class="btn" onclick="appendToDisplay('7')">7</button>
  <button class="btn" onclick="appendToDisplay('8')">8</button>
  <button class="btn" onclick="appendToDisplay('9')">9</button>
  <button class="operation" onclick="appendToDisplay('*')">×</button>

  <button class="btn" onclick="appendToDisplay('4')">4</button>
  <button class="btn" onclick="appendToDisplay('5')">5</button>
  <button class="btn" onclick="appendToDisplay('6')">6</button>
  <button class="operation" onclick="appendToDisplay('-')">-</button>

  <button class="btn" onclick="appendToDisplay('1')">1</button>
  <button class="btn" onclick="appendToDisplay('2')">2</button>
  <button class="btn" onclick="appendToDisplay('3')">3</button>
  <button class="operation" onclick="appendToDisplay('+')">+</button>

  <button class="btn" onclick="Negative()">+/-</button>
  <button class="btn" onclick="appendToDisplay('0')">0</button>
  <button class="btn" onclick="appendToDisplay('.')">.</button>
  <button class="operation" onclick="calculate()">=</button>
</div>
  </body>
  <script src="script.js"></script>
</html>
